name: Deploy to GitHub Pages

# Publishes the static site to GitHub Pages on every push to main.
# Replaces Netlify — the live URL becomes https://naphasworking.github.io/Nord-Werk/

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
        with:
          enablement: true        # turns Pages on automatically (no settings click needed)
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .                 # publish the whole site (repo root)
      - id: deployment
        uses: actions/deploy-pages@v4
